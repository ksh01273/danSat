name: Deploy DanSat

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, DanSat]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # --- Frontend Build ---
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy frontend
        run: |
          rm -rf /var/www/danSat/dist/*
          cp -r frontend/dist/* /var/www/danSat/dist/

      # --- Backend Deploy ---
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --production

      - name: Deploy backend
        run: |
          rm -rf /var/www/danSat/backend/node_modules /var/www/danSat/backend/src
          cp -r backend/package*.json backend/src /var/www/danSat/backend/
          cp -r backend/node_modules /var/www/danSat/backend/

      - name: Create .env.production
        run: |
          echo "PORT=3009" > /var/www/danSat/backend/.env.production
          echo "DB_HOST=192.168.10.55" >> /var/www/danSat/backend/.env.production
          echo "DB_PORT=5432" >> /var/www/danSat/backend/.env.production
          echo "DB_NAME=dansat" >> /var/www/danSat/backend/.env.production
          echo "DB_USER=dangam_mcp_user" >> /var/www/danSat/backend/.env.production
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> /var/www/danSat/backend/.env.production
          echo "NODE_ENV=production" >> /var/www/danSat/backend/.env.production
          cp /var/www/danSat/backend/.env.production /var/www/danSat/backend/.env

      - name: Validate .env exists
        run: |
          /usr/local/bin/validate-env.sh /var/www/danSat/backend PORT DB_HOST DB_NAME

      - name: Restart PM2
        run: |
          cd /var/www/danSat/backend
          pm2 restart dansat-api --update-env || pm2 start src/index.js --name dansat-api
          sleep 5
          curl -sf --retry 3 --retry-delay 2 http://localhost:3009/api/health || echo "Health check skipped"
          pm2 list | grep dansat-api
          echo "DanSat deploy complete!"